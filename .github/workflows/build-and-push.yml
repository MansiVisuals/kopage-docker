name: Build and push

on:
  schedule:
    # Every Monday 03:00 UTC — rebuild with the freshest base image and
    # Debian security updates, mirroring build-and-push.sh "force refresh"
    - cron: '0 3 * * 1'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - docker-entrypoint.sh
      - .github/workflows/build-and-push.yml

env:
  IMAGE: crypt010/kopage

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set APT cache buster
        run: echo "APT_CACHE_BUSTER=$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_ENV"

      - name: Set up QEMU (for arm64)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build amd64 only and load it locally so we can test before pushing
      - name: Build amd64 image for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          pull: true
          build-args: |
            APT_CACHE_BUSTER=${{ env.APT_CACHE_BUSTER }}
          tags: kopage:smoke-test

      - name: Smoke test image
        run: |
          set -eux
          # Required PHP extensions and ionCube must load
          docker run --rm --entrypoint sh kopage:smoke-test -c '
            set -e
            for ext in gd zip curl pdo_sqlite ionCube "Zend OPcache"; do
              php -m | grep -qiF "$ext"
            done
            apache2ctl configtest 2>&1 | grep -q "Syntax OK"
            command -v unzip >/dev/null
          '
          # Container must boot, extract the installer and serve it over HTTP
          docker run -d --name smoke -p 8080:80 -e PHP_SESSION_COOKIE_SECURE=0 kopage:smoke-test
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/install_izkopage-setup.php || true)
            [ "$code" = "200" ] && break
            sleep 2
          done
          [ "$code" = "200" ]
          # Brotli must be negotiated for clients that support it
          curl -s -D - -o /dev/null -H 'Accept-Encoding: br' http://localhost:8080/install_izkopage-setup.php \
            | grep -qi 'content-encoding: br'
          docker logs smoke
          docker rm -f smoke

      # amd64 layers are reused from the smoke-test build (same cache buster)
      - name: Build and push multi-arch
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          pull: true
          push: true
          build-args: |
            APT_CACHE_BUSTER=${{ env.APT_CACHE_BUSTER }}
          tags: ${{ env.IMAGE }}:latest
